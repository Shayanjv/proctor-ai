# =============================================================================
# nginx site config for the admin SPA
# -----------------------------------------------------------------------------
# - Serves the built Vite bundle from /usr/share/nginx/html
# - Falls back to index.html for any unknown path so client-side React Router
#   (e.g. /students/<id>) survives a hard refresh.
# - Long-cache hashed assets (.js/.css with content hash in filename) and
#   no-cache the index.html so deploys are picked up instantly.
# - Gzip on text MIME types to cut transfer size by ~70%.
# =============================================================================
server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Hashed Vite assets - cache for 1 year, immutable
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # All other paths - SPA history fallback
    location / {
        # Never cache the entry document; we want the latest bundle reference
        # to be picked up after each deploy.
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # Basic health endpoint for the reverse proxy / docker healthchecks
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
