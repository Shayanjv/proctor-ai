# =============================================================================
# nginx site config for the student SPA
# -----------------------------------------------------------------------------
# Mirrors the admin nginx.conf:
#   - Hashed Vite assets in /assets/ are immutable, cached 1 year.
#   - Everything else falls back to index.html so React Router survives
#     hard refreshes on routes like /exam, /lobby, /summary, etc.
#   - HTML entry document is never cached so deploys take effect instantly.
# =============================================================================
server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Generous body size: proctoring uploads webcam frames + screen recording
    # chunks via REST (in addition to WebSocket) - some chunks can exceed
    # the nginx default 1m. The reverse-proxy in front (Caddy) also raises
    # this for the api.* host, but raising it here too is defence-in-depth
    # if the SPA proxies any large blob through itself in future.
    client_max_body_size 50m;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
